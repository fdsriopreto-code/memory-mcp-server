<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#13131f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>

  <!-- Grid dots -->
  <g opacity="0.07" fill="#6366f1">
    <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/>
    <circle cx="60" cy="220" r="1.5"/><circle cx="120" cy="220" r="1.5"/>
    <circle cx="1020" cy="60" r="1.5"/><circle cx="1080" cy="60" r="1.5"/><circle cx="1140" cy="60" r="1.5"/>
    <circle cx="1020" cy="120" r="1.5"/><circle cx="1080" cy="120" r="1.5"/><circle cx="1140" cy="120" r="1.5"/>
    <circle cx="1020" cy="180" r="1.5"/><circle cx="1080" cy="180" r="1.5"/><circle cx="1140" cy="180" r="1.5"/>
    <circle cx="1020" cy="220" r="1.5"/><circle cx="1140" cy="220" r="1.5"/>
  </g>

  <!-- Glow circles in background -->
  <circle cx="200" cy="140" r="120" fill="#6366f1" opacity="0.04"/>
  <circle cx="1000" cy="140" r="100" fill="#a855f7" opacity="0.04"/>
  <circle cx="600" cy="140" r="200" fill="#6366f1" opacity="0.02"/>

  <!-- Left decoration nodes -->
  <circle cx="80" cy="100" r="4" fill="#6366f1" opacity="0.6"/>
  <circle cx="150" cy="160" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="100" cy="200" r="2.5" fill="#6366f1" opacity="0.4"/>
  <line x1="80" y1="100" x2="150" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="150" y1="160" x2="100" y2="200" stroke="#a855f7" stroke-width="1" opacity="0.2"/>

  <!-- Right decoration nodes -->
  <circle cx="1120" cy="100" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="1050" cy="160" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1100" cy="200" r="2.5" fill="#a855f7" opacity="0.4"/>
  <line x1="1120" y1="100" x2="1050" y2="160" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="1050" y1="160" x2="1100" y2="200" stroke="#6366f1" stroke-width="1" opacity="0.2"/>

  <!-- Accent bar -->
  <rect x="520" y="76" width="160" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Main title -->
  <text x="600" y="152" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="64" font-weight="800" letter-spacing="-2"
        fill="white">Memory MCP</text>

  <!-- Subtitle -->
  <text x="600" y="196" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="20" font-weight="400" letter-spacing="0.5"
        fill="rgba(255,255,255,0.45)">Persistent memory · Computer control · Autonomous agents</text>

  <!-- Bottom accent bar -->
  <rect x="520" y="216" width="160" height="3" rx="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Border -->
  <rect width="1200" height="280" fill="none" stroke="rgba(99,102,241,0.2)" stroke-width="1" rx="16"/>
</svg>
