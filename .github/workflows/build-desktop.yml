name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Build server (shared across all platforms) ───────────────────────────
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client (all platform binaries)
        working-directory: server
        run: npx prisma generate

      - name: Build server TypeScript
        working-directory: server
        run: npm run build

      - name: Prune dev dependencies
        working-directory: server
        run: npm prune --production

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            server/dist
            server/node_modules
            server/prisma/schema.prisma
          retention-days: 1

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    needs: build-server
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: server

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build TypeScript
        working-directory: electron
        run: npm run build

      - name: Build Windows installer
        working-directory: electron
        run: npm run dist:win -- --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-mcp-windows
          path: electron/release/*.exe

  # ── macOS ────────────────────────────────────────────────────────────────
  build-mac:
    needs: build-server
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: server

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build TypeScript
        working-directory: electron
        run: npm run build

      - name: Build macOS DMG
        working-directory: electron
        run: npm run dist:mac -- --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-mcp-mac
          path: electron/release/*.dmg

  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: server

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build TypeScript
        working-directory: electron
        run: npm run build

      - name: Build Linux AppImage
        working-directory: electron
        run: npm run dist:linux -- --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-mcp-linux
          path: electron/release/*.AppImage

  # ── Release ──────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memory-mcp-windows/*.exe
            memory-mcp-mac/*.dmg
            memory-mcp-linux/*.AppImage
          body: |
            ## Memory MCP Desktop v${{ github.ref_name }}

            ### Download
            | Plataforma | Arquivo |
            |---|---|
            | **Windows** | `Memory-MCP-Setup-*.exe` |
            | **macOS** | `Memory-MCP-*.dmg` |
            | **Linux** | `Memory-MCP-*.AppImage` |

            ### Como usar
            1. Baixe o instalador para seu sistema
            2. Instale e abra — o wizard de configuração aparece automaticamente
            3. Escolha modo **Local** (PostgreSQL no Neon.tech grátis) ou **VPS** (servidor existente)
            4. Pronto — fica no system tray, sempre disponível
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
