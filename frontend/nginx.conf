server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver — resolve hostnames em runtime, não no startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $upstream http://ferramentas_memory-mcp-server:3100;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        set $upstream http://ferramentas_memory-mcp-server:3100;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
