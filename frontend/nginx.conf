server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls para o mcp-server
    location /api/ {
        proxy_pass http://ferramentas_memory-mcp-server:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://ferramentas_memory-mcp-server:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
